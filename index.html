<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PC İZLEYİCİ - Magic 1973</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: sans-serif; overflow: hidden; }
        #status { position: fixed; top: 10px; left: 10px; padding: 10px; background: rgba(0,0,0,0.8); color: #00ff88; border: 1px solid #333; z-index: 100; border-radius: 5px; }
        canvas { display: block; background: #fff; margin: 0 auto; cursor: default; }
    </style>
</head>
<body>

<div id="status">Sistem Başlatılıyor (1973)...</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');

    // 1973 Algoritması: Toplamı 1973 olan sabit ID üretir
    function get1973Key() {
        const target = 1973;
        let key = "ROOM_"; 
        let sum = 0;
        for (let i = 0; i < key.length; i++) sum += key.charCodeAt(i);
        while (sum < (target - 90)) { key += 'Z'; sum += 90; }
        key += String.fromCharCode(target - sum);
        return key;
    }

    const pcID = "PC_" + get1973Key();

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.lineCap = 'round'; ctx.lineWidth = 4; ctx.strokeStyle = '#000';
    }
    window.addEventListener('resize', resize);
    resize();

    const peer = new Peer(pcID);

    peer.on('open', (id) => {
        statusText.innerText = "İZLEYİCİ HAZIR: Tableti açın...";
    });

    peer.on('connection', (conn) => {
        statusText.innerText = "BAĞLANDI: Çizim geliyor...";
        conn.on('data', (data) => {
            if (data.s) { ctx.beginPath(); ctx.moveTo(data.x, data.y); }
            else { ctx.lineTo(data.x, data.y); ctx.stroke(); }
        });
        conn.on('close', () => { statusText.innerText = "BAĞLANTI KOPTU."; });
    });
</script>
</body>
</html>
