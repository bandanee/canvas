<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wi-Fi Grafik Tablet Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #007AFF; --danger: #ff3b30; --bg: #121212; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; color: white; }
        
        /* Kontrol Paneli */
        #panel { position: fixed; top: 15px; left: 15px; background: rgba(25, 25, 25, 0.9); padding: 20px; border-radius: 15px; z-index: 100; backdrop-filter: blur(10px); border: 1px solid #333; width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h3 { margin: 0 0 5px 0; color: var(--accent); font-size: 18px; }
        .status { font-size: 11px; color: #888; margin-bottom: 15px; }
        
        .section { margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        label { display: block; font-size: 11px; margin-bottom: 5px; color: #aaa; }
        
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        #clear-btn { background: var(--danger); margin-top: 10px; font-size: 12px; }
        
        .badge { display: block; background: #000; padding: 8px; border-radius: 4px; font-family: monospace; color: #00ff00; text-align: center; border: 1px dashed #444; }
        
        /* Canvas */
        canvas { background: #fff; display: block; touch-action: none; cursor: crosshair; }
        .hidden { display: none !important; }
        
        /* Tablet Modu Özel */
        .tablet-only { background: rgba(0, 122, 255, 0.1) !important; border: 1px solid var(--accent) !important; }
    </style>
</head>
<body>

<div id="panel">
    <h3>Canvas Sync</h3>
    <div id="status" class="status">Başlatılıyor...</div>
    
    <div id="pc-ui">
        <div class="section">
            <label>PC KİMLİĞİ (Tablete Yazın)</label>
            <div id="my-id" class="badge">Bekleniyor...</div>
        </div>
        <p style="font-size: 10px; color: #666;">Tabletinizden bu sayfayı açın ve yukarıdaki kodu girin.</p>
    </div>

    <div id="tablet-ui" class="hidden">
        <div class="section tablet-only">
            <label>MASAÜSTÜ KİMLİĞİ</label>
            <input type="text" id="target-id" placeholder="PC Kodunu Girin">
            <button onclick="connectToPC()">Bağlan ve Çiz</button>
        </div>
    </div>

    <button id="clear-btn" onclick="clearCanvas()">Ekranı Temizle</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const myIdDisplay = document.getElementById('my-id');
    const targetInput = document.getElementById('target-id');
    const pcUi = document.getElementById('pc-ui');
    const tabletUi = document.getElementById('tablet-ui');

    // Cihaz Algılama
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if(isMobile) {
        pcUi.classList.add('hidden');
        tabletUi.classList.remove('hidden');
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000';
    }
    window.addEventListener('resize', resize);
    resize();

    // PeerJS Yapılandırması
    const peer = new Peer();
    let conn = null;

    peer.on('open', (id) => {
        myIdDisplay.innerText = id;
        status.innerText = isMobile ? "Bağlantı bekleniyor..." : "ID Hazır. Tablet bekleniyor...";
    });

    // Masaüstü: Bağlantıyı Kabul Et
    peer.on('connection', (connection) => {
        conn = connection;
        initSync();
    });

    // Tablet: Masaüstüne Bağlan
    function connectToPC() {
        const id = targetInput.value.trim();
        if(!id) return;
        
        conn = peer.connect(id);
        status.innerText = "Bağlanıyor...";
        
        conn.on('open', () => {
            initSync();
            tabletUi.classList.add('hidden');
        });
    }

    function initSync() {
        status.innerText = "Eşleşme Tamam!";
        status.style.color = "#00ff00";
        
        conn.on('data', (data) => {
            if (data.type === 'draw') draw(data.x, data.y, false);
            else if (data.type === 'start') draw(data.x, data.y, true);
            else if (data.type === 'clear') localClear();
        });
    }

    // Çizim Motoru
    let drawing = false;

    function draw(x, y, start) {
        if (start) {
            ctx.beginPath();
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    }

    function sendData(type, x, y) {
        if (conn && conn.open) {
            conn.send({ type, x, y });
        }
    }

    function handleStart(e) {
        drawing = true;
        const pos = getPos(e);
        draw(pos.x, pos.y, true);
        sendData('start', pos.x, pos.y);
    }

    function handleMove(e) {
        if (!drawing) return;
        const pos = getPos(e);
        draw(pos.x, pos.y, false);
        sendData('draw', pos.x, pos.y);
    }

    function getPos(e) {
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX, y: t.clientY };
    }

    function clearCanvas() {
        localClear();
        if (conn && conn.open) conn.send({ type: 'clear' });
    }

    function localClear() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Dinleyiciler
    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', () => drawing = false);

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('touchend', () => drawing = false);

</script>
</body>
</html>
