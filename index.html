<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wi-Fi Grafik Tablet Pro + AutoConnect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #007AFF; --danger: #ff3b30; --bg: #121212; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; color: white; }
        
        #panel { position: fixed; top: 15px; left: 15px; background: rgba(25, 25, 25, 0.9); padding: 20px; border-radius: 15px; z-index: 100; backdrop-filter: blur(10px); border: 1px solid #333; width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h3 { margin: 0 0 5px 0; color: var(--accent); font-size: 18px; }
        .status { font-size: 11px; color: #888; margin-bottom: 15px; font-weight: bold; }
        
        .section { margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: center; }
        label { display: block; font-size: 11px; margin-bottom: 5px; color: #aaa; text-align: left; }
        
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        
        .badge { display: block; background: #000; padding: 8px; border-radius: 4px; font-family: monospace; color: #00ff00; border: 1px dashed #444; margin-bottom: 10px; font-size: 12px; word-break: break-all; }
        #qrcode { background: white; padding: 10px; display: inline-block; border-radius: 8px; }
        
        canvas { background: #fff; display: block; touch-action: none; cursor: crosshair; }
        .hidden { display: none !important; }
        #clear-btn { background: var(--danger); }
        .reset-link { font-size: 10px; color: #666; text-decoration: underline; cursor: pointer; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div id="panel">
    <h3>Canvas Sync</h3>
    <div id="status" class="status">Başlatılıyor...</div>
    
    <div id="pc-ui">
        <div class="section">
            <label>TABLET İLE OKUTUN</label>
            <div id="qrcode"></div>
            <div id="my-id" class="badge" style="margin-top:10px">ID Oluşturuluyor...</div>
        </div>
    </div>

    <div id="tablet-ui" class="hidden">
        <div class="section">
            <input type="text" id="target-id" placeholder="PC Kodunu Girin">
            <button onclick="saveAndConnect()">Bağlan ve Hatırla</button>
            <span class="reset-link" onclick="forgetAndReload()">Hafızayı Temizle</span>
        </div>
    </div>

    <button id="clear-btn" onclick="clearCanvas()">Ekranı Temizle</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const myIdDisplay = document.getElementById('my-id');
    const targetInput = document.getElementById('target-id');
    const pcUi = document.getElementById('pc-ui');
    const tabletUi = document.getElementById('tablet-ui');

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    }
    window.addEventListener('resize', resize);
    resize();

    const peer = new Peer();
    let conn = null;

    peer.on('open', (id) => {
        myIdDisplay.innerText = id;
        
        if(isMobile) {
            pcUi.classList.add('hidden');
            tabletUi.classList.remove('hidden');
            
            // OTOMATİK BAĞLANTI KONTROLÜ
            const urlParams = new URLSearchParams(window.location.search);
            const autoId = urlParams.get('id') || localStorage.getItem('saved_pc_id');
            
            if(autoId) {
                targetInput.value = autoId;
                status.innerText = "Otomatik bağlanıyor...";
                connectToPC(autoId);
            } else {
                status.innerText = "Bağlantı bekleniyor...";
            }
        } else {
            // QR Kodu Oluştur (Masaüstü için)
            const connectUrl = window.location.href.split('?')[0] + "?id=" + id;
            new QRCode(document.getElementById("qrcode"), {
                text: connectUrl,
                width: 150, height: 150
            });
            status.innerText = "QR Hazır. Tabletle okutun.";
        }
    });

    peer.on('connection', (connection) => {
        conn = connection;
        initSync();
    });

    function saveAndConnect() {
        const id = targetInput.value.trim();
        if(!id) return;
        localStorage.setItem('saved_pc_id', id);
        connectToPC(id);
    }

    function connectToPC(id) {
        conn = peer.connect(id);
        conn.on('open', () => {
            initSync();
            tabletUi.classList.add('hidden');
        });
        // Bağlantı koparsa otomatik tekrar dene
        conn.on('close', () => {
            status.innerText = "Bağlantı koptu, yeniden deneniyor...";
            setTimeout(() => connectToPC(id), 2000);
        });
    }

    function forgetAndReload() {
        localStorage.removeItem('saved_pc_id');
        window.location.href = window.location.href.split('?')[0];
    }

    function initSync() {
        status.innerText = "SENKRONİZE EDİLDİ";
        status.style.color = "#00ff00";
        conn.on('data', (data) => {
            if (data.type === 'draw') draw(data.x, data.y, false);
            else if (data.type === 'start') draw(data.x, data.y, true);
            else if (data.type === 'clear') localClear();
        });
    }

    // Çizim Mantığı
    let drawing = false;
    function draw(x, y, start) {
        if (start) { ctx.beginPath(); ctx.moveTo(x, y); }
        else { ctx.lineTo(x, y); ctx.stroke(); }
    }

    function handleStart(e) {
        drawing = true;
        const pos = getPos(e);
        draw(pos.x, pos.y, true);
        if(conn) conn.send({ type: 'start', x: pos.x, y: pos.y });
    }

    function handleMove(e) {
        if (!drawing) return;
        const pos = getPos(e);
        draw(pos.x, pos.y, false);
        if(conn) conn.send({ type: 'draw', x: pos.x, y: pos.y });
    }

    function getPos(e) {
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX, y: t.clientY };
    }

    function clearCanvas() {
        localClear();
        if (conn) conn.send({ type: 'clear' });
    }

    function localClear() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('touchend', () => drawing = false);
</script>
</body>
</html>
