<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic 1973 - Auto Connect Canvas</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: white; }
        #status { position: fixed; top: 10px; left: 10px; font-size: 12px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 5px; border: 1px solid var(--accent); z-index: 1000; pointer-events: none; }
        canvas { display: block; background: #fff; touch-action: none; cursor: crosshair; }
        .pc-overlay { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

<div id="status">Sistem Başlatılıyor...</div>
<div class="pc-overlay">Algorithm: Sum(Chr) = 1973</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    // --- 1973 ALGORİTMASI ---
    // Toplamı 1973 olan "sabit" bir anahtar üretir.
    function generate1973Key() {
        const target = 1973;
        let currentSum = 0;
        let key = "CANVAS_"; // Sabit prefix
        
        for (let i = 0; i < key.length; i++) {
            currentSum += key.charCodeAt(i);
        }

        // Kalan farkı güvenli karakterlerle doldur (Örn: 'Z' = 90)
        while (currentSum < (target - 90)) {
            const char = 'Z';
            key += char;
            currentSum += 90;
        }

        // Tam 1973'e tamamlayan son karakteri ekle
        const lastChar = String.fromCharCode(target - currentSum);
        key += lastChar;
        return key;
    }

    const secretKey = generate1973Key();
    const pcID = "PC_" + secretKey;
    const tabletID = "TABLET_" + secretKey;

    // --- CANVAS AYARLARI ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000';
    }
    window.addEventListener('resize', resize);
    resize();

    // --- PEERJS BAĞLANTI ---
    // PC ise pcID ile bekler, Tablet ise tabletID ile açılır ve pcID'ye bağlanır.
    const peer = new Peer(isMobile ? tabletID : pcID);
    let conn = null;

    peer.on('open', (id) => {
        statusDiv.innerText = isMobile ? "Bağlantı Aranıyor..." : "İzleyici Hazır (1973)...";
        if (isMobile) {
            connectToPC();
        }
    });

    // Masaüstü: Tableti Kabul Et
    peer.on('connection', (connection) => {
        conn = connection;
        statusDiv.innerText = "BAĞLANDI: Tablet Çiziyor...";
        statusDiv.style.borderColor = "#00ff88";
        setupReceiver();
    });

    function connectToPC() {
        conn = peer.connect(pcID);
        conn.on('open', () => {
            statusDiv.innerText = "BAĞLANDI: Masaüstüne Aktarılıyor...";
            statusDiv.style.borderColor = "#00ff88";
        });

        // Koparsa tekrar dene
        conn.on('close', () => {
            statusDiv.innerText = "Yeniden Bağlanıyor...";
            setTimeout(connectToPC, 2000);
        });
    }

    // --- ÇİZİM VE SENKRONİZASYON ---
    function draw(x, y, isStart) {
        if (isStart) {
            ctx.beginPath();
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    }

    // Veri Alma (PC'de çalışır)
    function setupReceiver() {
        conn.on('data', (data) => {
            draw(data.x, data.y, data.start);
        });
    }

    // Veri Gönderme (Tablette çalışır)
    if (isMobile) {
        let drawing = false;

        const send = (x, y, start) => {
            if (conn && conn.open) {
                conn.send({ x, y, start });
            }
        };

        const handleStart = (e) => {
            drawing = true;
            const t = e.touches ? e.touches[0] : e;
            draw(t.clientX, t.clientY, true);
            send(t.clientX, t.clientY, true);
        };

        const handleMove = (e) => {
            if (!drawing) return;
            const t = e.touches ? e.touches[0] : e;
            draw(t.clientX, t.clientY, false);
            send(t.clientX, t.clientY, false);
        };

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => drawing = false);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
        window.addEventListener('touchend', () => drawing = false);
    }
</script>
</body>
</html>
